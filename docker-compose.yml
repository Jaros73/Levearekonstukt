services:
  rekonstrukce-web:
    container_name: rekonstrukce-web
    build:
      context: .
      dockerfile: Infra/Dockerfile
    image: rekonstrukce/web:local
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"
    networks:
      - edge

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/levearekonstrukt/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

networks:
  edge:
    external: true
    name: revicall_edge

volumes:
  caddy_data:
  caddy_config: